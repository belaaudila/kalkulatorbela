<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Premium Navy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header-icons">
        <button class="icon-btn"></button>
        <button id="iconResult" class="icon-btn" onclick="applyFromIcon()"></button>
    </div>

    <div class="user-identity">
        <p>Project Kalkulator</p>
        <h2>Bela Syakila & Mifta</h2>
    </div>

    <div class="display-area">
        <h1 id="screen">0</h1>
    </div>

    <div class="mode-nav">
        <button id="btnCalc" class="mode-btn active" onclick="showPanel('calc')">Kalkulator</button>
        <button id="btnStory" class="mode-btn" onclick="showPanel('story')">Soal Cerita</button>
    </div>

    <div id="calcPanel" class="btn-grid">
        <button class="btn scientific" onclick="append('Math.sin(')">sin</button>
        <button class="btn scientific" onclick="append('Math.cos(')">cos</button>
        <button class="btn scientific" onclick="append('Math.tan(')">tan</button>
        <button class="btn orange" onclick="append('/')">÷</button>

        <button class="btn" onclick="clearScreen()" style="color: #ff5555;">AC</button>
        <button class="btn" onclick="toggleSign()">+/-</button>
        <button class="btn" onclick="append('%')">%</button>
        <button class="btn orange" onclick="append('*')">×</button>

        <button class="btn" onclick="append('7')">7</button>
        <button class="btn" onclick="append('8')">8</button>
        <button class="btn" onclick="append('9')">9</button>
        <button class="btn orange" onclick="append('-')">-</button>

        <button class="btn" onclick="append('4')">4</button>
        <button class="btn" onclick="append('5')">5</button>
        <button class="btn" onclick="append('6')">6</button>
        <button class="btn orange" onclick="append('+')">+</button>

        <button class="btn" onclick="append('1')">1</button>
        <button class="btn" onclick="append('2')">2</button>
        <button class="btn" onclick="append('3')">3</button>
        <button class="btn orange" onclick="calculate()" style="background: var(--accent); color: var(--navy);">=</button>

        <button class="btn btn-zero" onclick="append('0')">0</button>
        <button class="btn" onclick="append('.')">,</button>
    </div>

    <div id="storyPanel">
        <textarea id="storyInput" placeholder="Contoh: Aina beli 5 apel, lalu beli lagi 3. Totalnya berapa?"></textarea>
        <button class="solve-btn" onclick="solveStory()">Jawaban</button>
    </div>
</div>

<div id="resultModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>Hasil Perhitungan</span>
            <span class="close-btn" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
            <p id="modalText"></p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
